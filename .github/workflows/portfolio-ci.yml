name: Portfolio CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - agent/**
      - feature/**

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Next.js application
        run: npm run build
